services:
  notification-service:
    image: ghcr.io/${IMAGE_NAME}:latest
    container_name: notification-service
    ports:
      - "8182:8182"
    environment:
      - SERVER_PORT=8182
      - SPRING_PROFILES_ACTIVE=prod
      - EUREKA_CLIENT_ENABLED=false

      # RabbitMQ Configuration
      - SPRING_RABBITMQ_HOST=rabbitmq-reshala
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=${RMQ_USER}
      - SPRING_RABBITMQ_PASSWORD=${RMQ_PASS}
      - SPRING_RABBITMQ_VIRTUAL_HOST=system-service

      # Mail Configuration (Resend)
      - SPRING_MAIL_PASSWORD=${RESEND_API_KEY}

    networks:
      - reshala-net
    restart: unless-stopped

networks:
  reshala-net:
    external: true