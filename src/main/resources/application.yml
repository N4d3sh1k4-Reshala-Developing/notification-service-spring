spring:
  application:
    name: notification-service-reshala

  cloud:
    config:
      enabled: false

  rabbitmq:
    host: localhost
    port: 5672
    username: system-user
    password: systempass
    virtual-host: system-service
    template:
      retry:
        enabled: true
        initial-interval: 1000ms
        max-attempts: 3

  mail:
    host: smtp.resend.com
    port: 465
    username: resend
    password: re_f3EzGhUX_6ortzRkxM6VSDfSSHSZAxg2L
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          starttls:
            enable: false

server:
  port: 8182

eureka:
  client:
    service-url:
      defaultZone: http://eureka-user:zvBGTYdMUJV7mpRs35YA@localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    ip-address: 127.0.0.1
    hostname: localhost
    instance-id: ${spring.application.name}:${server.port}